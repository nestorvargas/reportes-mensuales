services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: complemento360
      POSTGRES_USER: c360
      POSTGRES_PASSWORD: c360pass
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U c360 -d complemento360"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
